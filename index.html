<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>backphobic</title>

    <link rel="icon" href="https://web.archive.org/web/20240911115712im_/https://i0.wp.com/backphobic.com/wp-content/uploads/2024/04/cropped-cropped-deadman9-1.png" sizes="32x32">
    <link rel="icon" href="https://web.archive.org/web/20240911115712im_/https://i0.wp.com/backphobic.com/wp-content/uploads/2024/04/cropped-cropped-deadman9-1.png" sizes="192x192">
    <link rel="apple-touch-icon" href="https://web.archive.org/web/20240911115712im_/https://i0.wp.com/backphobic.com/wp-content/uploads/2024/04/cropped-cropped-deadman9-1.png">

    <link rel="stylesheet" id="dashicons-css" href="https://s.w.org/wp-includes/css/dashicons.min.css" media="all">

    <style>
        /* Base Page Setup - No extra centering constraints here */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            background-color: transparent !important;
        }

        /* The Custom Background Image - Now fixed and covering the whole viewport */
        #password-protected-background {
            background-image: url('https://web.archive.org/web/20240911115712im_/https://backphobic.com/wp-content/uploads/2024/09/pwpage1.jpg');
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-attachment: fixed;
            background-position: center center;
            background-repeat: no-repeat;
            background-size: cover;
            z-index: -1;
        }

        /* Form Layer Centering */
        #login {
            position: fixed; /* Keep it centrally floating */
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%); /* The trick to center statically */
            width: 300px;
            z-index: 10;
        }

        #loginform {
            background-color: transparent !important;
            border: none !important;
            box-shadow: none !important;
            padding: 0 !important; /* Removed huge padding that created the column effect */
        }

        label:not([for="password_protected_rememberme"]) {
            font-size: 14px;
            color: #ffffff;
            font-family: "Times New Roman", Times, serif;
            display: block;
            margin-bottom: 5px;
        }

        .input {
            width: 100%;
            box-sizing: border-box;
            background-color: #ffffff !important;
            border: 1px solid #0a0a0a !important;
            margin-bottom: 16px !important;
            padding: 3px 12px !important;
            border-radius: 0px !important;
            font-size: 23px !important;
            color: #32373c !important;
            box-shadow: inset 0 0 2px rgba(0,0,0,0.07) !important;
        }

        /* Submit Button Styling */
        #wp-submit {
            background-color: #2d2d2d;
            border: 0px solid #ffffff;
            padding: 8px 43px !important;
            border-radius: 0px;
            color: #ffffff;
            font-size: 13px;
            box-shadow: 0 0 5px rgba(0,0,0,0.51);
            font-family: "Times New Roman", Times, serif;
            cursor: pointer;
            display: block;
        }

        /* Password Eye Icon Setup */
        .wp-pwd {
            position: relative;
        }

        .button-secondary {
            position: absolute;
            right: 5px;
            top: 6px;
            background: none;
            border: none;
            cursor: pointer;
            color: #333;
        }
    </style>
</head>
<body>

    <div id="password-protected-background"></div>

    <div id="login">
        <form name="loginform" id="loginform" action="#" method="post">
            <div class="user-pass-wrap">
                <label for="password_protected_pass">Password</label>
                <div class="wp-pwd">
                    <input id="password_protected_pass" class="input password-input" type="password" name="password_protected_pwd" size="20" autocomplete="false" spellcheck="false" required="">
                    <button id="pp-hide-show-password" class="button button-secondary wp-hide-pw" type="button" aria-label="Show password">
                        <span class="dashicons dashicons-visibility" aria-hidden="true"></span>
                    </button>
                </div>
            </div>

            <p class="submit">
                <input type="submit" name="wp-submit" id="wp-submit" class="button button-primary button-large" value="Log In">
            </p>
        </form>
    </div>

    <script>
        document.getElementById('pp-hide-show-password').addEventListener('click', function(e) {
            e.preventDefault();
            let input = document.getElementById('password_protected_pass');
            let icon = this.querySelector('.dashicons');
            if (input.type === 'password') {
                input.type = 'text';
                icon.classList.remove('dashicons-visibility');
                icon.classList.add('dashicons-hidden');
            } else {
                input.type = 'password';
                icon.classList.remove('dashicons-hidden');
                icon.classList.add('dashicons-visibility');
            }
        });
    </script>

</body>
</html>
